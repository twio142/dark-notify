name: Build
on:
  pull_request:
  push:
    branches:
      - master

jobs:

  build-macos:
    name: Build on macOS
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          target: aarch64-apple-darwin
          override: true

      - name: Build
        run: cargo build --target aarch64-apple-darwin --release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dark-notify-arm64
          path: target/aarch64-apple-darwin/release/dark-notify

